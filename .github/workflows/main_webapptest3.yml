name: Build and deploy Node.js app to Azure Web App - webapptest3

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: npm run build

      - name: Verify standalone build exists
        run: |
          ls -la ./.next/standalone
          test -f ./.next/standalone/server.js

      - name: Prepare deployment package
        run: |
          mkdir deploy

          # Copy standalone server
          cp -R ./.next/standalone/* ./deploy/

          # Copy Next static files
          mkdir -p ./deploy/.next
          cp -R ./.next/static ./deploy/.next/static

          # Copy public assets
          if [ -d "./public" ]; then
            cp -R ./public ./deploy/public
          fi

      - name: Verify deployment package
        run: |
          echo "Deployment package contents:"
          find ./deploy -maxdepth 3 -type f | head -100

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./deploy-package

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3F1C601741E84A3E9F282ED5701E4C32 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1692174EC7E34A89AB15BD3FF8308662 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2ACC7569C3824F8F9D84CBF6C99075DA }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: webapptest3
          slot-name: Production
          package: ./deploy-package