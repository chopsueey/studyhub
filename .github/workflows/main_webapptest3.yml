name: Build and deploy Node.js app to Azure Web App - webapptest3

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install and build
        env: 
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          npm install --force
          npm run build

      # Next.js standalone mode requires public and static folders to be manually copied 
      # into the standalone folder so the Node server can serve them.
      - name: Copy static assets to standalone output
        run: |
          cp -R ./public ./.next/standalone/public || true
          cp -R ./.next/static ./.next/standalone/.next/static

      # Upload ONLY the optimized standalone folder, not your whole repository root
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./.next/standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./deploy-package
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3F1C601741E84A3E9F282ED5701E4C32 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1692174EC7E34A89AB15BD3FF8308662 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2ACC7569C3824F8F9D84CBF6C99075DA }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webapptest3'
          slot-name: 'Production'
          package: ./deploy-package